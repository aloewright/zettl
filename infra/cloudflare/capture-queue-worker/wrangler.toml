name = "zettel-capture-queue"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[queues.consumers]]
queue = "zettel-capture"
max_batch_size = 10
max_batch_timeout = 30

# Required secrets (set via `wrangler secret put`):
#   BACKEND_URL     — base URL of the backend, e.g. https://api.yourdomain.com
#   WEBHOOK_SECRET  — matches Capture:WebhookSecret in backend appsettings
