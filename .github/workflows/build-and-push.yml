name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/worker/package-lock.json

      - run: npm ci
        working-directory: src/worker

      - run: npm run typecheck
        working-directory: src/worker

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/zettel-web-ui/package-lock.json

      - run: npm ci
        working-directory: src/zettel-web-ui

      - run: npm test
        working-directory: src/zettel-web-ui

  test-voice-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: voice-service/requirements.txt

      - run: pip install -r requirements.txt
        working-directory: voice-service

      - name: Syntax check
        run: python -m py_compile main.py agent.py tools.py
        working-directory: voice-service

      - name: Import smoke test
        run: |
          python -c "
          import importlib, sys
          # Verify modules import without errors (mocks AWS/env not needed for import)
          import os
          os.environ.setdefault('ZETTEL_API_URL', 'http://localhost:5000')
          os.environ.setdefault('AWS_REGION', 'us-east-1')
          import tools
          print('tools imported OK')
          "
        working-directory: voice-service

  build-and-push-ghcr:
    needs: [test-worker, test-frontend, test-voice-service]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: frontend
            context: ./src/zettel-web-ui
          - image: voice-service
            context: ./voice-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
