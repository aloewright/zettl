name = "zettl"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[queues.consumers]]
queue = "zettel-embeddings"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "zettel-enrichment"
max_batch_size = 5
max_batch_timeout = 30

[[queues.producers]]
queue = "zettel-embeddings"
binding = "EMBED_QUEUE"

[[queues.producers]]
queue = "zettel-enrichment"
binding = "ENRICH_QUEUE"

[triggers]
# Blog generation: Monday 09:00 UTC | Social generation: daily 09:00 UTC
crons = ["0 9 * * MON", "0 9 * * *"]

# ── Custom domain routing ─────────────────────────────────────────────────────
# Worker Route on postpilot.cc/api/* takes priority over Cloudflare Pages.
# All other requests (UI) continue to be served by Pages.
[[routes]]
pattern = "postpilot.cc/api/*"
zone_name = "postpilot.cc"

# ── Cloudflare Secrets Store ───────────────────────────────────────────────────
# Secrets Store ID: e328ab1e3e624d24b1712d38aad51017
# Create each secret in the store with the same name as the binding.

[[secrets_store_secrets]]
binding = "DATABASE_URL"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "DATABASE_URL"

[[secrets_store_secrets]]
binding = "OPENAI_API_KEY"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "OPENAI_API_KEY"

[[secrets_store_secrets]]
binding = "KINDE_DOMAIN"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "KINDE_DOMAIN"

# Optional — omit the binding entirely if not needed
[[secrets_store_secrets]]
binding = "KINDE_AUDIENCE"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "KINDE_AUDIENCE"

[[secrets_store_secrets]]
binding = "CF_AI_GATEWAY_URL"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "CF_AI_GATEWAY_URL"

[[secrets_store_secrets]]
