name = "zettl"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
CF_AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/85d376fc54617bcb57185547f08e528b/x"
CF_ACCESS_TEAM = "worthy"
VOICE_SERVICE_URL = ""
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = "../zettel-web-ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/agents/*", "/health", "/media/*", "/voice-service/*"]

# ── Durable Objects (ChatAgent for AI chat) ─────────────────────────────────
[durable_objects]
bindings = [
  { name = "ChatAgent", class_name = "ChatAgent" },
]

[[migrations]]
tag = "v1_chat_agent"
new_sqlite_classes = ["ChatAgent"]

# ── Cloudflare D1 database ────────────────────────────────────────────────────
[[d1_databases]]
binding = "d1_db"
database_name = "zettel"
database_id = "066cf08e-6dc2-4ab6-baa7-9e8396d59e6c"

# ── Cloudflare Vectorize ──────────────────────────────────────────────────────
[[vectorize]]
binding = "vector_db"
index_name = "zettel-notes"


# ── Cloudflare AI (binding for AI Gateway — pre-authenticated) ────────────────
[ai]
binding = "AI"

# ── Cloudflare Browser Rendering ──────────────────────────────────────────────
[browser]
binding = "BROWSER"

# ── Cloudflare R2 (media uploads) ─────────────────────────────────────────────
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "zettel-media"

# ── Queues ────────────────────────────────────────────────────────────────────
[[queues.consumers]]
queue = "zettel-embeddings"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "zettel-enrichment"
max_batch_size = 5
max_batch_timeout = 30

[[queues.producers]]
queue = "zettel-embeddings"
binding = "EMBED_QUEUE"

[[queues.producers]]
queue = "zettel-enrichment"
binding = "ENRICH_QUEUE"

[triggers]
# Blog generation: Monday 09:00 UTC | Social generation: daily 09:00 UTC
crons = ["0 9 * * MON", "0 9 * * *"]

# Custom domain configured in CF Dashboard → Workers → zettl → Domains & Routes
# Routes all postpilot.cc traffic to this worker.

# ── Cloudflare Secrets Store ───────────────────────────────────────────────────
# Secrets Store ID: e328ab1e3e624d24b1712d38aad51017

[[secrets_store_secrets]]
binding = "BRAVE_API_KEY"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "BRAVE_API_KEY"

[[secrets_store_secrets]]
binding = "READWISE_ACCESS_TOKEN"
store_id = "e328ab1e3e624d24b1712d38aad51017"
secret_name = "READWISE_ACCESS_TOKEN"
