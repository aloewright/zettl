services:
  traefik:
    image: traefik:v3.4
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "9010:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  backend:
    image: ghcr.io/aloewright/zettl/backend:${VERSION:-latest}
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=zettelweb;Username=zettel;Password=zettel_dev"
      # Optional OTEL endpoint
      # Otel__Endpoint: "http://host.docker.internal:4317"

      # ── Kinde JWT authentication ──────────────────────────────────────────────
      # Set Kinde__Domain to enable JWT validation. Leave empty to disable auth
      # (e.g. for local development behind a VPN).
      Kinde__Domain: "${KINDE_ISSUER_URL:-}"
      Kinde__Audience: "${KINDE_AUDIENCE:-}"

      # ── AI — Cloudflare AI Gateway (optional but recommended) ─────────────────
      # Route all OpenAI calls through Cloudflare AI Gateway for caching,
      # rate limiting, and observability.
      # Create a gateway at: dash.cloudflare.com → AI Gateway → Create gateway
      # Then set the URL to: https://gateway.ai.cloudflare.com/v1/{account_id}/{gateway_name}
      Cloudflare__AiGatewayUrl: "${CF_AI_GATEWAY_URL:-}"

      # ── Embedding ─────────────────────────────────────────────────────────────
      # Provider: "openai" (default) or "ollama" (local)
      Embedding__Provider: "${EMBEDDING_PROVIDER:-openai}"
      Embedding__ApiKey: "${OPENAI_API_KEY:-}"
      Embedding__Model: "${EMBEDDING_MODEL:-text-embedding-3-large}"
      Embedding__Dimensions: "${EMBEDDING_DIMENSIONS:-3072}"
      # Ollama (only used when Provider=ollama)
      Embedding__OllamaUrl: "${OLLAMA_URL:-http://host.docker.internal:11434}"

      # ── Content generation ────────────────────────────────────────────────────
      ContentGeneration__Provider: "openai"
      ContentGeneration__ApiKey: "${OPENAI_API_KEY:-}"
      ContentGeneration__Model: "${CONTENT_MODEL:-gpt-4o}"

      # ── Capture webhooks (optional) ───────────────────────────────────────────
      Capture__WebhookSecret: "${CAPTURE_WEBHOOK_SECRET:-}"
      Capture__AllowedEmailSenders__0: "${CAPTURE_ALLOWED_EMAIL_SENDERS_0:-}"
      Capture__AllowedTelegramChatIds__0: "${CAPTURE_ALLOWED_TELEGRAM_CHAT_IDS_0:-}"
      Capture__TelegramBotToken: "${TELEGRAM_BOT_TOKEN:-}"

      # ── CORS ──────────────────────────────────────────────────────────────────
      Cors__AllowedOrigins__0: "${CORS_ORIGIN:-http://localhost:8081}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/health`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/aloewright/zettl/frontend:${VERSION:-latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - backend

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: zettelweb
      POSTGRES_USER: zettel
      POSTGRES_PASSWORD: zettel_dev
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zettel -d zettelweb"]
      interval: 2s
      timeout: 5s
      retries: 10
